<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arqos — Generador de Prospectos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: #888; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 26px; font-weight: 600; color: #111; }
  .sub { font-size: 14px; color: #666; margin-top: 4px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e6; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
  input, select { width: 100%; font-size: 14px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #111; outline: none; margin-bottom: 14px; font-family: inherit; }
  input:focus, select:focus { border-color: #111; background: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { width: 100%; padding: 12px; font-size: 14px; font-weight: 600; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: transparent; color: #111; border: 1px solid #ddd; padding: 8px 16px; width: auto; font-size: 13px; border-radius: 8px; cursor: pointer; font-family: inherit; }
  .btn-outline:hover { background: #f5f5f3; }
  .status { font-size: 13px; color: #666; margin-top: 10px; min-height: 18px; }
  .error { color: #c0392b; }
  .progress { height: 3px; background: #eee; border-radius: 2px; margin-top: 10px; display: none; }
  .progress-bar { height: 100%; background: #111; border-radius: 2px; width: 0%; transition: width 0.4s; }
  .note { font-size: 12px; color: #888; background: #f5f5f3; border-radius: 8px; padding: 10px 12px; margin-top: -4px; line-height: 1.5; }
  .note a { color: #111; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .results-title { font-size: 15px; font-weight: 600; }
  .badge { font-size: 12px; padding: 4px 10px; background: #f0f0ee; border-radius: 100px; color: #555; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 1px solid #f0f0ee; }
  td { padding: 10px 8px; border-bottom: 1px solid #f5f5f3; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .nombre { font-weight: 500; }
  .direccion { font-size: 11px; color: #aaa; margin-top: 2px; }
  .tel { color: #111; }
  .no-tel { color: #ccc; font-style: italic; font-size: 12px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 100px; }
  .tag-ok { background: #e8f5e9; color: #2e7d32; }
  .tag-no { background: #f5f5f3; color: #aaa; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .stat { background: #fff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 600; color: #111; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Arqos Systems</div>
    <h1>Generador de Prospectos</h1>
    <p class="sub">Extrae condominios y edificios en CDMX con nombre y teléfono</p>
  </div>

  <div class="card">
    <label>Google Places API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." />
    <div class="note">
      ¿No tienes tu key? Entra a <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console → Credenciales</a> y cópiala ahí.
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label>Tipo de prospecto</label>
        <select id="tipo">
          <option value="condominio">Condominios</option>
          <option value="edificio residencial">Edificios residenciales</option>
          <option value="edificio de oficinas">Edificios de oficinas</option>
          <option value="fraccionamiento">Fraccionamientos</option>
          <option value="conjunto habitacional">Conjuntos habitacionales</option>
          <option value="torre de departamentos">Torres de departamentos</option>
        </select>
      </div>
      <div>
        <label>Zona de CDMX</label>
        <select id="zona">
          <option value="Polanco Ciudad de Mexico">Polanco</option>
          <option value="Santa Fe Ciudad de Mexico">Santa Fe</option>
          <option value="Condesa Ciudad de Mexico">Condesa / Roma</option>
          <option value="Narvarte Ciudad de Mexico">Narvarte / Del Valle</option>
          <option value="Interlomas Huixquilucan">Interlomas</option>
          <option value="Lomas de Chapultepec Ciudad de Mexico">Lomas de Chapultepec</option>
          <option value="Coyoacan Ciudad de Mexico">Coyoacán</option>
          <option value="Tlalpan Ciudad de Mexico">Tlalpan</option>
          <option value="Pedregal Ciudad de Mexico">Pedregal</option>
          <option value="Insurgentes Sur Ciudad de Mexico">Insurgentes Sur</option>
        </select>
      </div>
    </div>
    <label>Resultados máximos</label>
    <select id="cantidad">
      <option value="20">20 prospectos</option>
      <option value="40">40 prospectos</option>
      <option value="60">60 prospectos</option>
    </select>
    <button class="btn" id="searchBtn" onclick="buscar()">Buscar prospectos</button>
    <div class="status" id="status"></div>
    <div class="progress" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="statsWrap" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Encontrados</div></div>
      <div class="stat"><div class="stat-num" id="statTel">0</div><div class="stat-label">Con teléfono</div></div>
      <div class="stat"><div class="stat-num" id="statPct">0%</div><div class="stat-label">Cobertura</div></div>
    </div>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="results-header">
      <span class="results-title">Resultados</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge" id="countBadge">0 prospectos</span>
        <button class="btn-outline" onclick="exportCSV()">Exportar CSV</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</div>

<script>
let leads = [];

async function buscar() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const tipo = document.getElementById('tipo').value;
  const zona = document.getElementById('zona').value;
  const cantidad = parseInt(document.getElementById('cantidad').value);

  if (!apiKey) { setStatus('⚠️ Ingresa tu API Key para continuar.', true); return; }

  leads = [];
  setStatus('Buscando prospectos...');
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('resultsCard').style.display = 'none';
  document.getElementById('statsWrap').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  setProgress(10);

  try {
    const query = `${tipo} en ${zona}`;
    const url = 'https://places.googleapis.com/v1/places:searchText';
    let allPlaces = [];
    let pageToken = null;
    let page = 0;
    const maxPages = Math.ceil(cantidad / 20);

    while (page < maxPages) {
      setStatus(`Obteniendo resultados... (${allPlaces.length} encontrados)`);
      setProgress(10 + (page / maxPages) * 70);

      const body = { textQuery: query, maxResultCount: 20, languageCode: 'es' };
      if (pageToken) body.pageToken = pageToken;

      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Goog-Api-Key': apiKey,
          'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.nextPageToken'
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data.error?.message || 'Error desconocido';
        throw new Error(msg);
      }

      if (data.places) allPlaces = allPlaces.concat(data.places);
      pageToken = data.nextPageToken;
      page++;
      if (!pageToken) break;
      await new Promise(r => setTimeout(r, 2000));
    }

    setProgress(95);
    leads = allPlaces.slice(0, cantidad).map((p, i) => ({
      num: i + 1,
      nombre: p.displayName?.text || 'Sin nombre',
      telefono: p.nationalPhoneNumber || '',
      direccion: p.formattedAddress || ''
    }));

    setProgress(100);
    renderResults();
    setStatus('');
  } catch (e) {
    setStatus('Error: ' + e.message, true);
    setProgress(0);
  } finally {
    document.getElementById('searchBtn').disabled = false;
    setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 800);
  }
}

function renderResults() {
  const tbody = document.getElementById('resultsBody');
  tbody.innerHTML = '';
  const conTel = leads.filter(l => l.telefono).length;
  const pct = leads.length ? Math.round((conTel / leads.length) * 100) : 0;

  document.getElementById('statTotal').textContent = leads.length;
  document.getElementById('statTel').textContent = conTel;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('statsWrap').style.display = 'block';

  leads.forEach(l => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#aaa;font-size:12px;">${l.num}</td>
      <td>
        <div class="nombre">${l.nombre}</div>
        <div class="direccion">${l.direccion.split(',').slice(0,2).join(',')}</div>
      </td>
      <td>${l.telefono ? `<span class="tel">${l.telefono}</span>` : '<span class="no-tel">No disponible</span>'}</td>
      <td>${l.telefono ? '<span class="tag tag-ok">Con tel</span>' : '<span class="tag tag-no">Sin tel</span>'}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('countBadge').textContent = `${leads.length} prospectos`;
  document.getElementById('resultsCard').style.display = 'block';
}

function exportCSV() {
  if (!leads.length) return;
  const rows = [['#', 'Nombre', 'Teléfono', 'Dirección']];
  leads.forEach(l => rows.push([l.num, l.nombre, l.telefono, l.direccion]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'prospectos_arqos.csv'; a.click();
  URL.revokeObjectURL(url);
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}
</script>
</body>
</html>
